name: Benchmark Run

on:
  schedule:
    # One run per day, but the hour rotates across the week so we sample different
    # times-of-day over time (model availability / load varies by hour).
    # Budget: 1 batch-gen call + 16 models × 3 cats = 49 req/day ≤ 50 free-tier cap.
    - cron: "0  2 * * 0"   # Sunday    02:00 UTC
    - cron: "0  8 * * 1"   # Monday    08:00 UTC
    - cron: "0 14 * * 2"   # Tuesday   14:00 UTC
    - cron: "0 20 * * 3"   # Wednesday 20:00 UTC
    - cron: "0  5 * * 4"   # Thursday  05:00 UTC
    - cron: "0 11 * * 5"   # Friday    11:00 UTC
    - cron: "0 17 * * 6"   # Saturday  17:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bench-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run benchmark
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/run_benchmark.py

      - name: Commit and push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.xlsx results.json trend.json state.json prompt_history.json responses images
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "bench: run $(date -u '+%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git push && break
              git pull --rebase && sleep 2
            done
            echo "Results committed and pushed"
          fi
